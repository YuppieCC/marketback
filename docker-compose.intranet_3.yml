  #     - go-mod-cache-8191:/go/pkg/mod
  #   depends_on:
  #     postgres_intranet_8191:
  #       condition: service_healthy
  #     app_intranet_8191:
  #       condition: service_healthy
  #   command: go run schedule/wash_task.go
