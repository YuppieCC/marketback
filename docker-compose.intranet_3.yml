  #     options:
  #       max-size: "10m"
  #       max-file: "3"

networks:
  app-test-network-3190:
    driver: bridge

volumes:
  postgres_test_data_8191:
    name: marketcontrol_postgres_test_data_8191
    driver: local
  go-mod-cache-8191:
    name: marketcontrol_go_mod_cache_8191
    driver: local

