version: '3.8'

services:
  app_intranet_8191:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: app_intranet_8191
    ports:
      - "8191:8080"
    environment:
      - DB_HOST=postgres_intranet_8191
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=marketcontrol_test
      - DB_PORT=5432
      - PORT=8080
      - ENCRYPTPASSWORD=4LAx4rxfcT78WADGh2pa
      - HELIUS_API_KEY=b94d046f-3bcd-45d9-85d9-543118c6dd3d
      - DEFAULT_SOLANA_RPC=https://mainnet.helius-rpc.com/?api-key=b94d046f-3bcd-45d9-85d9-543118c6dd3d
      - RABBITMQ_HOST=rabbitmq_intranet_3190
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - ALLOWED_ORIGINS=http://localhost:3190,http://localhost:3191,http://localhost:3193,http://192.168.1.234:3190
    volumes:
      - ./:/app
      - go-mod-cache-8191:/go/pkg/mod
    depends_on:
      postgres_intranet_8191:
        condition: service_healthy
      # rabbitmq_test:
        # condition: service_healthy
    networks:
      - app-test-network-3190
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres_intranet_8191:
    image: postgres:15-alpine
    container_name: postgres_intranet_8191
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketcontrol_test
    ports:
      - "5435:5432"
    volumes:
      - postgres_test_data_8191:/var/lib/postgresql/data
    networks:
      - app-test-network-3190
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq_intranet_3190:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_intranet_3190
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5674:5672"
      - "15674:15672"
    networks:
      - app-test-network-3190
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker_meteora_monitor_3190:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker_meteora_monitor_3190
    environment:
      - DB_HOST=postgres_intranet_8191
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=marketcontrol_test
      - DB_PORT=5432
      - HELIUS_API_KEY=b94d046f-3bcd-45d9-85d9-543118c6dd3d
      - DEFAULT_SOLANA_RPC=https://solitary-cold-wave.solana-mainnet.quiknode.pro/63b3a44f21ffd8834ba23667f9979e8d3ba06d6f/
      - DEFAULT_SOLANA_WSS=wss://solitary-cold-wave.solana-mainnet.quiknode.pro/63b3a44f21ffd8834ba23667f9979e8d3ba06d6f/
      - RABBITMQ_HOST=rabbitmq_intranet_3190
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
    volumes:
      - ./:/app
      - go-mod-cache-8191:/go/pkg/mod
    depends_on:
      postgres_intranet_8191:
        condition: service_healthy
      rabbitmq_intranet_3190:
        condition: service_healthy
      app_intranet_8191:
        condition: service_healthy
    command: go run cmd/worker/main.go
    restart: unless-stopped
    networks:
      - app-test-network-3190
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

